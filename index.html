<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>our chat</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b0b0c; color: #e4e4e7; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 480px; height: 100vh; background: #121214; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.6); }
        
        /* Header */
        .header { padding: 16px; background: #1a1a1e; border-bottom: 1px solid #27272a; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { margin: 0; font-size: 18px; font-weight: 600; color: #fff; }
        .status { font-size: 12px; color: #a1a1aa; display: flex; align-items: center; gap: 6px; }
        .status::before { content: ''; display: inline-block; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }
        .status.online::before { background: #22c55e; }

        /* Setup Screen */
        .setup-screen { padding: 24px; display: flex; flex-direction: column; gap: 16px; flex-grow: 1; justify-content: center; }
        .setup-card { background: #1a1a1e; border: 1px solid #27272a; padding: 16px; border-radius: 12px; }
        textarea { width: 100%; box-sizing: border-box; background: #27272a; color: #fff; border: 1px solid #3f3f46; padding: 10px; border-radius: 8px; resize: none; font-size: 13px; font-family: monospace; margin-top: 8px; word-break: break-all; }
        button { background: #3b82f6; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 14px; width: 100%; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        .secondary-btn { background: #27272a; border: 1px solid #3f3f46; }
        .secondary-btn:hover { background: #3f3f46; }

        /* Chat Screen */
        .chat-screen { flex-grow: 1; display: flex; flex-direction: column; height: calc(100vh - 53px); }
        .messages { flex-grow: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #0b0b0c; }
        
        /* Message Bubbles */
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-break: break-word; }
        .msg.me { background: #2563eb; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.them { background: #27272a; color: #e4e4e7; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 4px; display: block; }
        .file-link { color: #60a5fa; display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 14px; }
        audio { max-width: 100%; margin-top: 4px; display: block; }

        /* Input Bar */
        .input-bar { padding: 12px; background: #1a1a1e; border-top: 1px solid #27272a; display: flex; align-items: center; gap: 8px; }
        .input-bar input[type="text"] { flex-grow: 1; background: #27272a; border: 1px solid #3f3f46; color: #fff; padding: 10px 14px; border-radius: 20px; font-size: 14px; outline: none; }
        .icon-btn { background: none; border: none; padding: 8px; width: auto; color: #a1a1aa; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { color: #fff; background: #27272a; }
        .icon-btn.recording { color: #ef4444; animation: pulse 1.5s infinite; }

        .hidden { display: none !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1>our chat</h1>
        <div id="status-tag" class="status">offline</div>
    </div>
    
    <div id="setup-view" class="setup-screen">
        <div id="mode-select">
            <button id="start-btn" style="margin-bottom: 12px;">Create Chat</button>
            <button id="join-menu-btn" class="secondary-btn">Join Chat</button>
        </div>

        <div id="host-panel" class="hidden setup-card">
            <span style="font-size: 14px;">Send this invite string:</span>
            <textarea id="outbound-code" rows="5" readonly placeholder="Generating..."></textarea>
            <button id="copy-invite-btn" style="margin: 8px 0;">Copy Invite</button>
            <textarea id="inbound-reply" rows="3" placeholder="Paste response here..."></textarea>
            <button id="connect-host-btn" style="margin-top: 8px;">Connect</button>
        </div>

        <div id="join-panel" class="hidden setup-card">
            <textarea id="inbound-invite" rows="3" placeholder="Paste invite here..."></textarea>
            <button id="gen-reply-btn" style="margin: 8px 0;">Accept Invite</button>
            <div id="reply-wrapper" class="hidden">
                <textarea id="outbound-reply" rows="5" readonly placeholder="Generating..."></textarea>
                <button id="copy-reply-btn" style="margin-top: 8px;">Copy Response</button>
            </div>
        </div>
    </div>

    <div id="chat-view" class="chat-screen hidden">
        <div id="messages-container" class="messages"></div>
        <div class="input-bar">
            <input type="file" id="file-input" class="hidden" accept="image/*, application/*">
            <button id="attach-btn" class="icon-btn" title="Send File/Image">📎</button>
            
            <input type="text" id="text-input" placeholder="Message">
            
            <button id="voice-btn" class="icon-btn" title="Hold to record">🎤</button>
            <button id="send-btn" class="icon-btn" style="color: #3b82f6;">➔</button>
        </div>
    </div>
</div>

<script>
    // Setting iceServers to empty fixes the blank string bug on bad connections by skipping external network lookups
    const pc = new RTCPeerConnection({ iceServers: [] });
    let dataChannel;
    let mediaRecorder;
    let audioChunks = [];

    const setupView = document.getElementById('setup-view'), chatView = document.getElementById('chat-view');
    const modeSelect = document.getElementById('mode-select'), hostPanel = document.getElementById('host-panel'), joinPanel = document.getElementById('join-panel');
    const messagesContainer = document.getElementById('messages-container'), textInput = document.getElementById('text-input');
    const statusTag = document.getElementById('status-tag');

    // Force immediate generation without waiting for slow network timeouts
    async function displayLocalDescription(elementId) {
        if (pc.localDescription) {
            document.getElementById(elementId).value = btoa(JSON.stringify(pc.localDescription));
        }
    }

    document.getElementById('start-btn').onclick = async () => {
        modeSelect.classList.add('hidden'); hostPanel.classList.remove('hidden');
        dataChannel = pc.createDataChannel("chatChannel", { ordered: true });
        bindChannelEvents(dataChannel);
        
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        // Display it instantly instead of waiting for gathering events
        displayLocalDescription('outbound-code');
    };

    document.getElementById('join-menu-btn').onclick = () => { modeSelect.classList.add('hidden'); joinPanel.classList.remove('hidden'); };

    document.getElementById('connect-host-btn').onclick = async () => {
        const reply = JSON.parse(atob(document.getElementById('inbound-reply').value.trim()));
        await pc.setRemoteDescription(new RTCSessionDescription(reply));
    };

    document.getElementById('gen-reply-btn').onclick = async () => {
        const invite = JSON.parse(atob(document.getElementById('inbound-invite').value.trim()));
        pc.ondatachannel = (e) => { dataChannel = e.channel; bindChannelEvents(dataChannel); };
        await pc.setRemoteDescription(new RTCSessionDescription(invite));
        
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        
        document.getElementById('reply-wrapper').classList.remove('hidden');
        displayLocalDescription('outbound-reply');
    };

    // Fallback display if anything changes late
    pc.onicecandidate = (e) => {
        if (!e.candidate) {
            if (dataChannel && dataChannel.id !== null) {
                displayLocalDescription('outbound-code');
            } else {
                displayLocalDescription('outbound-reply');
            }
        }
    };

    document.getElementById('copy-invite-btn').onclick = () => { navigator.clipboard.writeText(document.getElementById('outbound-code').value); };
    document.getElementById('copy-reply-btn').onclick = () => { navigator.clipboard.writeText(document.getElementById('outbound-reply').value); };

    function bindChannelEvents(chan) {
        chan.onopen = () => {
            setupView.classList.add('hidden');
            chatView.classList.remove('hidden');
            statusTag.textContent = "online";
            statusTag.classList.add('online');
        };
        chan.onmessage = (e) => {
            const data = JSON.parse(e.data);
            displayMessage(data, 'them');
        };
    }

    document.getElementById('send-btn').onclick = dispatchText;
    textInput.onkeypress = (e) => { if(e.key === 'Enter') dispatchText(); };

    function dispatchText() {
        const txt = textInput.value.trim();
        if(txt && dataChannel && dataChannel.readyState === "open") {
            const payload = { type: 'text', content: txt };
            dataChannel.send(JSON.stringify(payload));
            displayMessage(payload, 'me');
            textInput.value = "";
        }
    }

    const fileInput = document.getElementById('file-input');
    document.getElementById('attach-btn').onclick = () => fileInput.click();
    
    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            const payload = {
                type: file.type.startsWith('image/') ? 'image' : 'file',
                content: reader.result,
                fileName: file.name
            };
            if(dataChannel && dataChannel.readyState === "open") {
                dataChannel.send(JSON.stringify(payload));
                displayMessage(payload, 'me');
            }
        };
        reader.readAsDataURL(file);
    };

    const voiceBtn = document.getElementById('voice-btn');
    voiceBtn.onclick = async () => {
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/ogg; codecs=opus' });
                const reader = new FileReader();
                reader.onload = () => {
                    const payload = { type: 'voice', content: reader.result };
                    if(dataChannel && dataChannel.readyState === "open") {
                        dataChannel.send(JSON.stringify(payload));
                        displayMessage(payload, 'me');
                    }
                };
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(track => track.stop());
            };
            
            mediaRecorder.start();
            voiceBtn.classList.add('recording');
        } else {
            mediaRecorder.stop();
            voiceBtn.classList.remove('recording');
        }
    };

    function displayMessage(data, sender) {
        const bubble = document.createElement('div');
        bubble.className = `msg ${sender}`;

        if (data.type === 'text') {
            bubble.innerText = data.content;
        } else if (data.type === 'image') {
            const img = document.createElement('img');
            img.src = data.content;
            bubble.appendChild(img);
        } else if (data.type === 'file') {
            const link = document.createElement('a');
            link.href = data.content;
            link.download = data.fileName;
            link.className = 'file-link';
            link.innerHTML = `📄 ${data.fileName}`;
            bubble.appendChild(link);
        } else if (data.type === 'voice') {
            const audio = document.createElement('audio');
            audio.src = data.content;
            audio.controls = true;
            bubble.appendChild(audio);
        }

        messagesContainer.appendChild(bubble);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
</script>
</body>
</html>
